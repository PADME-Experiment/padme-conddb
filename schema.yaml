# ======================================================================
# PADME Conditions Database — Schema Definition
# ======================================================================
#
# Four tables:
#
#   runs        — one row per run, immutable metadata
#   tags        — named condition snapshots (like "global tags" in CMS/ATLAS)
#   conditions  — IoV-scoped, versioned scalar conditions
#   monitoring  — dense time-series observables within a run (EAV layout)
#
# Edit this file and run `python padme_conditions_db.py --build` to apply.
#
# Per-column fields
# -----------------
#   type          DuckDB SQL type; append NOT NULL here if needed
#   primary_key   true → part of the table's PRIMARY KEY
#   auto_increment true → backed by a SEQUENCE (INTEGER columns only)
#   default       SQL default expression, e.g. "current_timestamp"
#   index         true → CREATE INDEX on this column
#   fk            "other_table.column" → FOREIGN KEY
#   description   documentation (not written to DB)
# ======================================================================

tables:

  # --------------------------------------------------------------------
  # runs — immutable per-run metadata
  # --------------------------------------------------------------------
  runs:
    description: "One row per run. Written once at run start; never updated."
    columns:
      run_number:
        type: INTEGER
        primary_key: true
        description: "Run number — unique identifier"
      run_type:
        type: VARCHAR
        description: "production | calibration | cosmic | test | noise"
      start_time:
        type: TIMESTAMPTZ
        description: "Run start (wall-clock)"
      end_time:
        type: TIMESTAMPTZ
        description: "Run end (wall-clock); NULL if run is still ongoing"
      ebeam_nominal:
        type: DOUBLE
        description: "Nominal beam energy [MeV]"
      sqrt_s_nominal:
        type: DOUBLE
        description: "Nominal centre-of-mass energy [MeV]"
      is_good:
        type: BOOLEAN
        default: "true"
        description: "Data-quality flag; false = excluded from physics analysis"
      notes:
        type: VARCHAR
        description: "Free-text shifter comments or known issues"

  # --------------------------------------------------------------------
  # tags — named condition snapshots
  #
  # A tag groups a self-consistent set of conditions for one processing
  # campaign.  Query conditions with a specific tag to get a reproducible
  # view of the detector state, even after recalibration.
  #
  # Examples: "online_v1", "reprocessing_2025v1", "mc_alignment_v3"
  # --------------------------------------------------------------------
  tags:
    description: "Named condition snapshots — use one tag per processing campaign."
    columns:
      tag_name:
        type: VARCHAR
        primary_key: true
        description: "Short unique label, e.g. 'reprocessing_2025v1'"
      description:
        type: VARCHAR
        description: "Human-readable purpose of this tag"
      created_at:
        type: TIMESTAMPTZ
        default: "current_timestamp"
        description: "When this tag was registered"
      created_by:
        type: VARCHAR
        description: "Username or process that created the tag"

  # --------------------------------------------------------------------
  # conditions — versioned, IoV-scoped scalar conditions
  #
  # Each row is one (quantity, value ± uncertainty) valid over a run range
  # and/or a wall-clock range, belonging to a named tag.
  #
  # Typical query:
  #   SELECT * FROM conditions
  #   WHERE tag = 'reprocessing_2025v1'
  #     AND quantity = 'charge_calib'
  #     AND since_run <= 80500
  #     AND (until_run IS NULL OR until_run >= 80500)
  #
  # until_run IS NULL means the condition is open-ended (still current).
  # --------------------------------------------------------------------
  conditions:
    description: "Core IoV table — one row per condition interval."
    columns:
      condition_id:
        type: INTEGER
        primary_key: true
        auto_increment: true
        description: "Surrogate key"
      tag:
        type: "VARCHAR NOT NULL"
        index: true
        fk: "tags.tag_name"
        description: "Tag this condition belongs to"
      detector:
        type: VARCHAR
        index: true
        description: "Sub-detector: leadglass | target | ecal | pveto | eveto | sac | trigger"
      quantity:
        type: "VARCHAR NOT NULL"
        index: true
        description: "Quantity name, e.g. 'charge_calib', 'beam_x', 'threshold_mv'"
      value:
        type: DOUBLE
        description: "Central value"
      uncertainty:
        type: DOUBLE
        description: "1-sigma uncertainty (NULL if not applicable)"
      unit:
        type: VARCHAR
        description: "Physical unit string, e.g. 'pC', 'mm', 'MeV'"
      since_run:
        type: INTEGER
        index: true
        description: "First run for which this condition is valid (inclusive)"
      until_run:
        type: INTEGER
        index: true
        description: "Last valid run (inclusive); NULL = open-ended"
      valid_since:
        type: TIMESTAMPTZ
        description: "Wall-clock start of validity (complement to run-based IoV)"
      valid_until:
        type: TIMESTAMPTZ
        description: "Wall-clock end of validity; NULL = still current"
      source_file:
        type: VARCHAR
        description: "File or process that produced this condition"
      created_at:
        type: TIMESTAMPTZ
        default: "current_timestamp"
        description: "Row insertion timestamp"
      notes:
        type: VARCHAR
        description: "Free-text provenance notes"

  # --------------------------------------------------------------------
  # monitoring — dense per-run time-series (EAV layout)
  #
  # Stores high-cadence observables: one row per (run, time-slice,
  # detector, quantity).  EAV keeps this table detector-agnostic — new
  # sub-detectors are added by ingesting new (detector, quantity) pairs
  # without any schema change.
  #
  # For wide-table access patterns, use a pivot view:
  #   PIVOT (SELECT * FROM monitoring WHERE detector='leadglass')
  #   ON quantity USING first(value)
  # --------------------------------------------------------------------
  monitoring:
    description: "Dense time-series observables; one row per quantity per time slice."
    columns:
      run_number:
        type: "INTEGER NOT NULL"
        index: true
        fk: "runs.run_number"
        description: "Run number"
      unix_time:
        type: "BIGINT NOT NULL"
        index: true
        description: "Unix timestamp of the time slice [seconds]"
      detector:
        type: "VARCHAR NOT NULL"
        index: true
        description: "Sub-detector label"
      quantity:
        type: "VARCHAR NOT NULL"
        description: "Observable name"
      value:
        type: DOUBLE
        description: "Measured value"
      uncertainty:
        type: DOUBLE
        description: "1-sigma uncertainty"
      n_events:
        type: INTEGER
        description: "Number of events accumulated in this time slice"
      source_file:
        type: VARCHAR
        description: "Source file this row was ingested from"
